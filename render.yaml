services:
  - type: web
    name: tnt-news-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm run db:migrate:prod
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
